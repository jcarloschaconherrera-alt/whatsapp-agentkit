  Bono inicio rápido: $40 por cliente (124.5 CV / 25%)

  ### SOFTWARE GOLD PACK — $299 de inscripción + $245 al mes
  (Precio regular: $399.99 — precio especial: $299)
  Incluye todo lo del Pro Pack MÁS:
  - Scanner MAITRYX (avanzado)
  Bono inicio rápido: $50 por cliente (198 CV)

  ### PAQUETE 3 MESES — $365 (promoción hasta fin de año)
  (Precio regular: $730 — 50% OFF)
  Incluye: Señales VIP, Lumen Cripto, Hummingbird, Trading Journal, Sistema de Acompañamiento
  Bono inicio rápido: $35 (99 CV cada mes)
  Derechos de venta incluidos: $29 entrada + $15/mes

  ### SUSCRIPCIÓN MENSUAL (precio de lanzamiento 50% OFF)
